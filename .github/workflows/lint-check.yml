name: Lint Check

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  lint-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint and Markdownlint Checks
        run: npm run lint
